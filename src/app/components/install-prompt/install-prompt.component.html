<div 
  *ngIf="showInstallPrompt && !isRunningAsPWA()"
  class="fixed top-0 left-0 right-0 bg-gradient-to-r from-saffron-600 to-orange-600 text-white shadow-lg z-50 animate-slide-down">
  <div class="container mx-auto px-4 py-3">
    <div class="flex items-center justify-between gap-4">
      <!-- Icon and Message -->
      <div class="flex items-center gap-3 flex-grow">
        <span class="text-2xl">📱</span>
        <div class="flex-grow">
          <p class="font-semibold text-sm md:text-base">
            Install Karunamayi Hanuman E-Mandir
          </p>
          <p class="text-xs opacity-90">
            Access the temple anytime, even offline!
          </p>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex items-center gap-2">
        <button 
          (click)="install()"
          class="bg-white text-saffron-700 px-4 py-2 rounded-lg font-semibold text-sm hover:bg-saffron-50 transition-all transform active:scale-95 whitespace-nowrap">
          Install
        </button>
        <button 
          (click)="dismissPrompt()"
          class="text-white hover:text-saffron-100 p-2 transition-all"
          aria-label="Dismiss install prompt">
          ✕
        </button>
      </div>
    </div>
  </div>
</div>
