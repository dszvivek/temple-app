<button 
  *ngIf="isVisible"
  class="floating-bell-btn"
  [class.ringing]="isRinging"
  (click)="ringBell()"
  aria-label="Ring Temple Bell"
  title="Ring Temple Bell 🔔">
  
  <!-- Bell SVG Icon -->
  <svg 
    class="bell-icon" 
    viewBox="0 0 24 24" 
    fill="none" 
    xmlns="http://www.w3.org/2000/svg">
    <path 
      d="M12 2C11.4477 2 11 2.44772 11 3V3.17071C8.16519 3.58254 6 6.01946 6 9V14L4 16V17H20V16L18 14V9C18 6.01946 15.8348 3.58254 13 3.17071V3C13 2.44772 12.5523 2 12 2Z" 
      fill="currentColor"/>
    <path 
      d="M10 20C10 21.1046 10.8954 22 12 22C13.1046 22 14 21.1046 14 20H10Z" 
      fill="currentColor"/>
  </svg>

  <!-- Ripple effect on click -->
  <span class="ripple" *ngIf="isRinging"></span>
</button>
