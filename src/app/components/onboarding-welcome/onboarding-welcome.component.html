<div *ngIf="isVisible" class="onboarding-overlay" @fadeInOut>
  <div class="onboarding-container">
    <!-- Header -->
    <div class="onboarding-header">
      <h2 class="onboarding-title">{{ lang.t('onboarding.welcomeRitual') }}</h2>
      <button 
        class="skip-button"
        (click)="skip()"
        [attr.aria-label]="lang.t('onboarding.skipIntro')">
        {{ lang.t('onboarding.skipIntro') }}
      </button>
    </div>

    <!-- Ritual Steps -->
    <div class="ritual-steps">
      <!-- Step 1: Ring Bell -->
      <div class="step" [class.active]="currentStep === 0" [class.completed]="currentStep > 0">
        <div class="step-icon bell-icon">🔔</div>
        <p class="step-text">{{ lang.t('onboarding.step1') }}</p>
        <div class="step-progress" *ngIf="currentStep === 0"></div>
      </div>

      <!-- Step 2: Light Lamp -->
      <div class="step" [class.active]="currentStep === 1" [class.completed]="currentStep > 1">
        <div class="step-icon lamp-icon">🪔</div>
        <p class="step-text">{{ lang.t('onboarding.step2') }}</p>
        <div class="step-progress" *ngIf="currentStep === 1"></div>
      </div>

      <!-- Step 3: Offer Flowers -->
      <div class="step" [class.active]="currentStep === 2" [class.completed]="currentStep > 2">
        <div class="step-icon flower-icon">🌺</div>
        <p class="step-text">{{ lang.t('onboarding.step3') }}</p>
        <div class="step-progress" *ngIf="currentStep === 2"></div>
      </div>
    </div>

    <!-- Progress Dots -->
    <div class="progress-dots">
      <span class="dot" [class.active]="currentStep >= 0"></span>
      <span class="dot" [class.active]="currentStep >= 1"></span>
      <span class="dot" [class.active]="currentStep >= 2"></span>
    </div>
  </div>
</div>
