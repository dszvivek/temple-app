<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 max-w-sm pointer-events-none">
  <div 
    *ngFor="let toast of toasts" 
    @toastAnimation
    [class]="getToastClass(toast.type)"
    class="pointer-events-auto shadow-soft-lg rounded-xl border-l-4 p-4 flex items-start gap-3 backdrop-blur-sm bg-opacity-95 animate-slide-in-right">
    
    <!-- Icon -->
    <span class="text-2xl flex-shrink-0">{{ getToastIcon(toast.type) }}</span>
    
    <!-- Message -->
    <p class="flex-grow text-sm font-medium leading-relaxed">{{ toast.message }}</p>
    
    <!-- Close Button -->
    <button 
      (click)="dismissToast(toast.id)"
      class="flex-shrink-0 text-gray-500 hover:text-gray-700 transition-colors focus-ring rounded"
      aria-label="Close notification">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>
</div>
