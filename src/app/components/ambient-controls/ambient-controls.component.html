<div class="ambient-controls">
  <!-- Temple Status -->
  <div class="flex items-center gap-2 px-3 py-2 rounded-xl transition-all"
       [class.bg-green-100]="isTempleOpen" 
       [class.bg-red-50]="!isTempleOpen"
       [class.border-green-300]="isTempleOpen"
       [class.border-red-200]="!isTempleOpen"
       style="border: 1px solid;">
    <div class="flex items-center gap-2">
      <img 
        *ngIf="isTempleOpen" 
        src="assets/svg/diya.svg" 
        alt="Temple Diya" 
        class="w-5 h-5 animate-pulse"
        width="20"
        height="20">
      <span class="w-2 h-2 rounded-full" [class.bg-green-500]="isTempleOpen" [class.bg-red-400]="!isTempleOpen"></span>
      <span class="text-sm font-semibold" [class.text-green-700]="isTempleOpen" [class.text-red-600]="!isTempleOpen">
        Temple {{ isTempleOpen ? 'Open' : 'Closed' }}
      </span>
    </div>
    <div *ngIf="nextStatusChange" class="text-xs text-gray-500 ml-1">
      · {{ isTempleOpen ? 'Closes' : 'Opens' }} in {{ getTimeUntilChange() }}
    </div>
  </div>

  <!-- Incense Smoke Animation (when ambience is playing) -->
  <div *ngIf="isAmbiencePlaying && isTempleOpen" class="incense-container">
    <img 
      src="assets/svg/incense_smoke.svg" 
      alt="Incense" 
      class="incense-smoke"
      width="40"
      height="60">
  </div>

  <!-- Initialize Button (shown only on first interaction) -->
  <button 
    *ngIf="!isAmbiencePlaying && isTempleOpen && !isMuted"
    class="px-4 py-2.5 bg-gradient-to-r from-orange-500 to-red-500 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all text-sm"
    (click)="onUserInteraction()">
    🔊 Enable Sounds
  </button>

  <!-- Audio Controls -->
  <div class="flex items-center gap-1.5">
    <!-- Mute Toggle -->
    <button 
      class="w-10 h-10 flex items-center justify-center rounded-xl transition-all"
      [class.bg-orange-100]="!isMuted"
      [class.bg-gray-100]="isMuted"
      [class.text-orange-600]="!isMuted"
      [class.text-gray-400]="isMuted"
      (click)="toggleMute()"
      title="{{ isMuted ? 'Unmute' : 'Mute' }}">
      {{ isMuted ? '🔇' : '🔊' }}
    </button>

    <!-- Ambience Control -->
    <button 
      class="w-10 h-10 flex items-center justify-center rounded-xl transition-all disabled:opacity-40"
      [class.bg-purple-100]="isAmbiencePlaying"
      [class.text-purple-600]="isAmbiencePlaying"
      [class.bg-gray-100]="!isAmbiencePlaying"
      [class.text-gray-500]="!isAmbiencePlaying"
      (click)="isAmbiencePlaying ? stopAmbience() : playAmbience()"
      [disabled]="isMuted"
      title="{{ isAmbiencePlaying ? 'Stop Ambience' : 'Play Ambience' }}">
      🎵
    </button>

    <!-- Bell -->
    <button 
      class="w-10 h-10 flex items-center justify-center rounded-xl bg-yellow-50 text-yellow-600 hover:bg-yellow-100 transition-all disabled:opacity-40"
      (click)="ringBell()"
      [disabled]="isMuted"
      title="Ring Temple Bell">
      🔔
    </button>

    <!-- Shankh -->
    <button 
      class="w-10 h-10 flex items-center justify-center rounded-xl bg-pink-50 text-pink-600 hover:bg-pink-100 transition-all disabled:opacity-40"
      (click)="playShankh()"
      [disabled]="isMuted"
      title="Play Shankh">
      🐚
    </button>
  </div>
</div>
