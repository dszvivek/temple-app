<div class="diya-counter-container">
  <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-xl border border-orange-100 overflow-hidden">
    <!-- Header -->
    <div class="px-4 py-3 bg-gradient-to-r from-orange-100 to-yellow-100 border-b border-orange-200">
      <div class="flex items-center justify-center gap-2">
        <span class="text-2xl">🪔</span>
        <span class="font-bold text-orange-800">Diya Counter</span>
      </div>
    </div>

    <div class="p-4">
      <!-- Main Counter -->
      <div class="text-center mb-4">
        <div class="text-4xl md:text-5xl font-bold text-orange-600 mb-1" [class.animate-pulse]="displayedTotal !== totalCount">
          {{ formatNumber(displayedTotal) }}
        </div>
        <div class="text-sm text-gray-600 font-medium">Diyas Lit by Devotees</div>
      </div>

      <!-- Stats Row -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-orange-50 rounded-xl p-3 text-center border border-orange-100">
          <div class="text-lg">📅</div>
          <div class="text-xl font-bold text-orange-700">{{ formatNumber(displayedToday) }}</div>
          <div class="text-xs text-orange-600">Today</div>
        </div>
        <div class="bg-yellow-50 rounded-xl p-3 text-center border border-yellow-100">
          <div class="text-lg">🗓️</div>
          <div class="text-xl font-bold text-yellow-700">{{ formatNumber(displayedMonth) }}</div>
          <div class="text-xs text-yellow-600">This Month</div>
        </div>
      </div>

      <!-- Motivational Message -->
      <div class="bg-gradient-to-r from-orange-50 to-yellow-50 rounded-xl p-3 text-center border border-orange-200">
        <p class="text-sm text-orange-700">
          ✨ Join thousands in spreading light! ✨
        </p>
      </div>
    </div>
  </div>
</div>
