<div *ngIf="isOpen" 
     class="modal-backdrop" 
     @backdropAnimation
     (click)="onBackdropClick($event)"
     (keydown)="onKeydown($event)"
     tabindex="-1"
     role="dialog"
     aria-labelledby="diya-modal-title"
     aria-modal="true">
  
  <div class="modal-container" @modalAnimation>
    <!-- Modal Header -->
    <div class="modal-header bg-gradient-to-r from-orange-500 to-red-500 rounded-t-2xl p-4">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🪔</span>
        <h2 id="diya-modal-title" class="text-xl font-bold text-white">
          {{ lang.t('diya.modalTitle') }}
        </h2>
      </div>
      <button 
        class="w-8 h-8 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 text-white transition-all"
        (click)="close()"
        [attr.aria-label]="lang.t('devMode.close')"
        type="button">
        ✕
      </button>
    </div>

    <!-- Modal Body -->
    <div class="modal-body p-5">
      <p class="text-gray-600 text-center mb-5 text-sm">
        {{ lang.t('diya.modalDescription') }}
      </p>

      <form (ngSubmit)="onSubmit()" #diyaForm="ngForm">
        <!-- Name Input -->
        <div class="mb-4">
          <label for="diya-name" class="block text-sm font-semibold text-gray-700 mb-2">
            {{ lang.t('diya.nameLabel') }} <span class="text-red-500">*</span>
          </label>
          <input 
            type="text"
            id="diya-name"
            name="name"
            [(ngModel)]="name"
            [maxlength]="maxLength"
            [placeholder]="lang.t('diya.namePlaceholder')"
            class="w-full px-4 py-3 border-2 rounded-xl transition-all outline-none text-base"
            [class.border-red-300]="errorMessage && !name.trim()"
            [class.border-green-400]="successMessage"
            [class.border-gray-200]="!errorMessage && !successMessage"
            [class.focus:border-orange-400]="true"
            [class.focus:ring-2]="true"
            [class.focus:ring-orange-100]="true"
            required
            autofocus
            [disabled]="isSubmitting">
          
          <!-- Character Counter -->
          <div class="text-right text-xs mt-1" [class.text-orange-500]="remainingChars < 5" [class.text-gray-400]="remainingChars >= 5">
            {{ name.length }}/{{ maxLength }}
            <span *ngIf="remainingChars < 5" class="font-medium">
              ({{ remainingChars }} left)
            </span>
          </div>
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage" class="bg-green-50 border border-green-200 rounded-xl p-3 mb-4 flex items-center gap-2">
          <span class="text-green-500 text-lg">✓</span>
          <span class="text-green-800 text-sm font-medium">{{ successMessage }}</span>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-3 mb-4 flex items-center gap-2">
          <span class="text-red-500 text-lg">!</span>
          <span class="text-red-800 text-sm font-medium">{{ errorMessage }}</span>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-3 mt-5">
          <button 
            type="button"
            class="flex-1 py-3 px-4 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition-all"
            (click)="close()"
            [disabled]="isSubmitting">
            {{ lang.t('diya.cancel') }}
          </button>
          <button 
            type="submit"
            class="flex-1 py-3 px-4 bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="!isValidName || isSubmitting">
            <span *ngIf="!isSubmitting">🪔 {{ lang.t('diya.lightDiya') }}</span>
            <span *ngIf="isSubmitting" class="flex items-center justify-center gap-2">
              <span class="animate-spin">⏳</span> {{ lang.t('diya.lighting') }}
            </span>
          </button>
        </div>
      </form>

      <!-- Info Box -->
      <div class="mt-5 bg-orange-50 rounded-xl p-4 border border-orange-200">
        <p class="text-sm text-orange-800">
          💡 <strong>{{ lang.t('diya.noteTitle') }}</strong> {{ lang.t('diya.noteDescription') }}
        </p>
      </div>
    </div>
  </div>
</div>
