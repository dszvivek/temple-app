<div class="sacred-background">
  <!-- Rotating Om Symbol 1 -->
  <div class="om-symbol om-1">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <text x="50" y="65" text-anchor="middle" class="om-text">🕉️</text>
    </svg>
  </div>
  
  <!-- Rotating Om Symbol 2 -->
  <div class="om-symbol om-2">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <text x="50" y="65" text-anchor="middle" class="om-text">🕉️</text>
    </svg>
  </div>
  
  <!-- Rotating Om Symbol 3 -->
  <div class="om-symbol om-3">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <text x="50" y="65" text-anchor="middle" class="om-text">🕉️</text>
    </svg>
  </div>
  
  <!-- Simple Mandala Pattern -->
  <div class="mandala mandala-1">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255, 153, 51, 0.15)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(255, 204, 0, 0.15)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="40" fill="none" stroke="rgba(255, 153, 51, 0.15)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="20" fill="none" stroke="rgba(255, 204, 0, 0.15)" stroke-width="0.5"/>
      <!-- Petals -->
      <g class="mandala-petals">
        <ellipse cx="100" cy="40" rx="8" ry="20" fill="rgba(255, 153, 51, 0.1)"/>
        <ellipse cx="100" cy="160" rx="8" ry="20" fill="rgba(255, 153, 51, 0.1)"/>
        <ellipse cx="40" cy="100" rx="20" ry="8" fill="rgba(255, 153, 51, 0.1)"/>
        <ellipse cx="160" cy="100" rx="20" ry="8" fill="rgba(255, 153, 51, 0.1)"/>
        <ellipse cx="65" cy="65" rx="12" ry="20" fill="rgba(255, 204, 0, 0.1)" transform="rotate(-45 65 65)"/>
        <ellipse cx="135" cy="65" rx="12" ry="20" fill="rgba(255, 204, 0, 0.1)" transform="rotate(45 135 65)"/>
        <ellipse cx="65" cy="135" rx="12" ry="20" fill="rgba(255, 204, 0, 0.1)" transform="rotate(45 65 135)"/>
        <ellipse cx="135" cy="135" rx="12" ry="20" fill="rgba(255, 204, 0, 0.1)" transform="rotate(-45 135 135)"/>
      </g>
    </svg>
  </div>
  
  <!-- Simple Mandala Pattern 2 -->
  <div class="mandala mandala-2">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(245, 158, 11, 0.15)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(252, 211, 77, 0.15)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="40" fill="none" stroke="rgba(245, 158, 11, 0.15)" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="20" fill="none" stroke="rgba(252, 211, 77, 0.15)" stroke-width="0.5"/>
      <!-- Petals -->
      <g class="mandala-petals">
        <ellipse cx="100" cy="40" rx="8" ry="20" fill="rgba(245, 158, 11, 0.1)"/>
        <ellipse cx="100" cy="160" rx="8" ry="20" fill="rgba(245, 158, 11, 0.1)"/>
        <ellipse cx="40" cy="100" rx="20" ry="8" fill="rgba(245, 158, 11, 0.1)"/>
        <ellipse cx="160" cy="100" rx="20" ry="8" fill="rgba(245, 158, 11, 0.1)"/>
        <ellipse cx="65" cy="65" rx="12" ry="20" fill="rgba(252, 211, 77, 0.1)" transform="rotate(-45 65 65)"/>
        <ellipse cx="135" cy="65" rx="12" ry="20" fill="rgba(252, 211, 77, 0.1)" transform="rotate(45 135 65)"/>
        <ellipse cx="65" cy="135" rx="12" ry="20" fill="rgba(252, 211, 77, 0.1)" transform="rotate(45 65 135)"/>
        <ellipse cx="135" cy="135" rx="12" ry="20" fill="rgba(252, 211, 77, 0.1)" transform="rotate(-45 135 135)"/>
      </g>
    </svg>
  </div>
</div>
