<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="180" viewBox="0 0 220 180">
  <defs>
    <linearGradient id="smokeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#d1d5db" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e5e7eb" stop-opacity="0"/>
    </linearGradient>
    <filter id="smokeBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <style>
      @keyframes rise1 {
        0% { transform: translateY(0) scaleX(1) rotate(0deg); opacity: 0; }
        10% { opacity: 0.5; }
        50% { transform: translateY(-50px) scaleX(1.3) rotate(5deg); opacity: 0.35; }
        100% { transform: translateY(-100px) scaleX(1.8) rotate(-5deg); opacity: 0; }
      }
      @keyframes rise2 {
        0% { transform: translateY(0) scaleX(1) rotate(0deg); opacity: 0; }
        10% { opacity: 0.45; }
        50% { transform: translateY(-55px) scaleX(1.4) rotate(-8deg); opacity: 0.3; }
        100% { transform: translateY(-110px) scaleX(2) rotate(8deg); opacity: 0; }
      }
      @keyframes rise3 {
        0% { transform: translateY(0) scaleX(1) rotate(0deg); opacity: 0; }
        10% { opacity: 0.4; }
        50% { transform: translateY(-45px) scaleX(1.2) rotate(6deg); opacity: 0.25; }
        100% { transform: translateY(-95px) scaleX(1.6) rotate(-6deg); opacity: 0; }
      }
      @keyframes rise4 {
        0% { transform: translateY(0) scaleX(1) rotate(0deg); opacity: 0; }
        10% { opacity: 0.35; }
        50% { transform: translateY(-60px) scaleX(1.5) rotate(-4deg); opacity: 0.2; }
        100% { transform: translateY(-120px) scaleX(2.2) rotate(4deg); opacity: 0; }
      }
      .s1 { animation: rise1 5s ease-out infinite; transform-origin: center bottom; }
      .s2 { animation: rise2 6.5s ease-out infinite 1.2s; transform-origin: center bottom; }
      .s3 { animation: rise3 7s ease-out infinite 2.4s; transform-origin: center bottom; }
      .s4 { animation: rise4 8s ease-out infinite 3.6s; transform-origin: center bottom; }
    </style>
  </defs>
  
  <g transform="translate(110,140)" filter="url(#smokeBlur)">
    <!-- Multiple smoke paths for realistic effect -->
    <path class="s1" d="M0,0 C-8,-15 -12,-30 -4,-50 C6,-70 2,-85 -6,-105" 
          fill="none" stroke="url(#smokeGrad)" stroke-width="8" stroke-linecap="round"/>
    
    <path class="s2" d="M0,0 C10,-12 14,-28 5,-48 C-8,-72 -4,-88 8,-112" 
          fill="none" stroke="url(#smokeGrad)" stroke-width="10" stroke-linecap="round"/>
    
    <path class="s3" d="M0,0 C-5,-10 -8,-22 -2,-38 C7,-60 4,-78 -3,-100" 
          fill="none" stroke="url(#smokeGrad)" stroke-width="7" stroke-linecap="round"/>
    
    <path class="s4" d="M0,0 C6,-14 10,-32 3,-52 C-6,-76 -2,-92 5,-118" 
          fill="none" stroke="url(#smokeGrad)" stroke-width="9" stroke-linecap="round"/>
    
    <!-- Additional wispy trails -->
    <path class="s1" style="animation-delay: 0.5s" d="M-3,0 C-12,-18 -8,-35 -10,-55 C-12,-75 -5,-90 -12,-110" 
          fill="none" stroke="url(#smokeGrad)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    
    <path class="s3" style="animation-delay: 1.8s" d="M3,0 C12,-16 8,-33 10,-53 C12,-73 5,-88 12,-108" 
          fill="none" stroke="url(#smokeGrad)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
