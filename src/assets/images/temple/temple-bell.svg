<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Bell -->
  <defs>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="transparent"/>
  
  <!-- Bell top -->
  <circle cx="100" cy="40" r="12" fill="#b8860b"/>
  <rect x="97" y="40" width="6" height="15" fill="#a16207"/>
  
  <!-- Bell body -->
  <path d="M 70 55 Q 65 60, 60 85 L 60 120 Q 60 130, 70 135 L 130 135 Q 140 130, 140 120 L 140 85 Q 135 60, 130 55 Z" 
        fill="url(#bellGrad)" stroke="#92400e" stroke-width="2"/>
  
  <!-- Bell rim -->
  <ellipse cx="100" cy="135" rx="40" ry="8" fill="#fbbf24"/>
  <ellipse cx="100" cy="133" rx="38" ry="6" fill="#fef3c7"/>
  
  <!-- Decorative patterns -->
  <circle cx="85" cy="85" r="4" fill="#fef3c7" opacity="0.6"/>
  <circle cx="115" cy="85" r="4" fill="#fef3c7" opacity="0.6"/>
  <circle cx="100" cy="100" r="5" fill="#fef3c7" opacity="0.6"/>
  
  <!-- Clapper -->
  <line x1="100" y1="120" x2="100" y2="145" stroke="#78350f" stroke-width="3"/>
  <ellipse cx="100" cy="148" rx="6" ry="8" fill="#92400e"/>
  
  <!-- Sound waves -->
  <g opacity="0.4">
    <path d="M 50 90 Q 45 90, 40 90" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <path d="M 150 90 Q 155 90, 160 90" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <path d="M 35 100 Q 25 100, 20 100" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <path d="M 165 100 Q 175 100, 180 100" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <text x="100" y="185" font-size="16" text-anchor="middle" fill="#78350f" 
        font-family="serif" font-weight="bold">🔔</text>
</svg>
