<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="durgaGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="durgaSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd9bd"/>
      <stop offset="100%" style="stop-color:#f5c6aa"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="redSari" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="200" cy="280" rx="180" ry="220" fill="url(#durgaGlow)"/>
  
  <!-- Hair -->
  <ellipse cx="200" cy="100" rx="60" ry="40" fill="#1f2937"/>
  <path d="M145 90 Q130 130 140 180 Q155 200 160 160 Q165 120 145 90" fill="#1f2937"/>
  <path d="M255 90 Q270 130 260 180 Q245 200 240 160 Q235 120 255 90" fill="#1f2937"/>
  
  <!-- Crown -->
  <g filter="url(#glowEffect)">
    <path d="M145 85 L155 50 L175 70 L200 40 L225 70 L245 50 L255 85 Q200 90 145 85" fill="url(#goldGradient)"/>
    <circle cx="155" cy="70" r="6" fill="#ef4444"/>
    <circle cx="178" cy="58" r="5" fill="#22c55e"/>
    <circle cx="200" cy="50" r="7" fill="#3b82f6"/>
    <circle cx="222" cy="58" r="5" fill="#22c55e"/>
    <circle cx="245" cy="70" r="6" fill="#ef4444"/>
    <!-- Crown top ornament -->
    <ellipse cx="200" cy="35" rx="10" ry="5" fill="#fcd34d"/>
  </g>
  
  <!-- Third Eye (Teeka) -->
  <g filter="url(#glowEffect)">
    <circle cx="200" cy="115" r="6" fill="#dc2626"/>
    <circle cx="200" cy="115" r="3" fill="#fcd34d"/>
  </g>
  
  <!-- Face -->
  <ellipse cx="200" cy="145" rx="50" ry="55" fill="url(#durgaSkin)"/>
  
  <!-- Eyes (fierce but beautiful) -->
  <ellipse cx="175" cy="140" rx="14" ry="10" fill="white"/>
  <ellipse cx="225" cy="140" rx="14" ry="10" fill="white"/>
  <circle cx="177" cy="141" r="6" fill="#1e293b"/>
  <circle cx="227" cy="141" r="6" fill="#1e293b"/>
  <circle cx="179" cy="139" r="2" fill="white"/>
  <circle cx="229" cy="139" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M158 125 Q175 118 192 128" fill="none" stroke="#1f2937" stroke-width="2.5"/>
  <path d="M208 128 Q225 118 242 125" fill="none" stroke="#1f2937" stroke-width="2.5"/>
  
  <!-- Nose -->
  <path d="M200 140 L195 160 Q200 164 205 160" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  <circle cx="198" cy="162" r="2" fill="#fcd34d"/> <!-- Nose ring -->
  
  <!-- Lips -->
  <ellipse cx="200" cy="175" rx="12" ry="5" fill="#dc2626"/>
  
  <!-- Ears with large earrings -->
  <ellipse cx="148" cy="145" rx="6" ry="12" fill="url(#durgaSkin)"/>
  <ellipse cx="252" cy="145" rx="6" ry="12" fill="url(#durgaSkin)"/>
  <g filter="url(#glowEffect)">
    <circle cx="148" cy="162" r="10" fill="url(#goldGradient)"/>
    <circle cx="252" cy="162" r="10" fill="url(#goldGradient)"/>
    <circle cx="148" cy="162" r="4" fill="#ef4444"/>
    <circle cx="252" cy="162" r="4" fill="#ef4444"/>
  </g>
  
  <!-- Neck -->
  <rect x="180" y="195" width="40" height="20" fill="url(#durgaSkin)"/>
  
  <!-- Necklace -->
  <g filter="url(#glowEffect)">
    <path d="M155 220 Q200 240 245 220" fill="none" stroke="url(#goldGradient)" stroke-width="6"/>
    <circle cx="175" cy="228" r="5" fill="#ef4444"/>
    <circle cx="200" cy="235" r="6" fill="#22c55e"/>
    <circle cx="225" cy="228" r="5" fill="#ef4444"/>
  </g>
  
  <!-- Multiple Arms (showing 8 arms for Durga) -->
  <!-- Main body/torso -->
  <path d="M155 215 Q200 210 245 215 L255 320 Q200 330 145 320 Z" fill="url(#durgaSkin)"/>
  
  <!-- Red sari -->
  <path d="M145 310 Q200 325 255 310 L265 450 Q200 465 135 450 Z" fill="url(#redSari)"/>
  <path d="M180 320 Q200 450 220 320" fill="none" stroke="#fcd34d" stroke-width="3"/>
  
  <!-- Left arms (4) -->
  <g fill="url(#durgaSkin)">
    <!-- Lower left 1 -->
    <path d="M155 250 Q100 280 70 250 Q50 230 60 210" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Lower left 2 -->
    <path d="M155 260 Q90 310 50 310 Q30 300 40 280" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Upper left 1 -->
    <path d="M155 230 Q110 200 90 160 Q80 140 95 130" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Upper left 2 -->
    <path d="M155 240 Q100 230 60 200 Q40 185 50 170" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Right arms (4) -->
  <g fill="url(#durgaSkin)">
    <!-- Lower right 1 -->
    <path d="M245 250 Q300 280 330 250 Q350 230 340 210" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Lower right 2 -->
    <path d="M245 260 Q310 310 350 310 Q370 300 360 280" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Upper right 1 -->
    <path d="M245 230 Q290 200 310 160 Q320 140 305 130" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Upper right 2 -->
    <path d="M245 240 Q300 230 340 200 Q360 185 350 170" stroke="url(#durgaSkin)" stroke-width="18" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Weapons in hands -->
  <g filter="url(#glowEffect)">
    <!-- Trishul (upper left) -->
    <path d="M80 120 L95 100 L110 120 M95 100 L95 160" stroke="#9ca3af" stroke-width="4" fill="none"/>
    
    <!-- Sword (upper right) -->
    <rect x="300" y="100" width="8" height="60" fill="#d1d5db" transform="rotate(15, 304, 130)"/>
    <rect x="296" y="155" width="16" height="10" fill="url(#goldGradient)" transform="rotate(15, 304, 160)"/>
    
    <!-- Chakra (lower right 1) -->
    <circle cx="340" cy="220" r="20" fill="none" stroke="url(#goldGradient)" stroke-width="4"/>
    <circle cx="340" cy="220" r="12" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
    
    <!-- Lotus (lower left 1) -->
    <g transform="translate(55, 220)">
      <ellipse cx="0" cy="0" rx="15" ry="8" fill="#f472b6"/>
      <path d="M-12 0 Q-8 -15 0 0" fill="#ec4899"/>
      <path d="M-6 0 Q0 -18 6 0" fill="#ec4899"/>
      <path d="M12 0 Q8 -15 0 0" fill="#ec4899"/>
    </g>
    
    <!-- Bow (lower right 2) -->
    <path d="M360 270 Q380 310 360 350" fill="none" stroke="#92400e" stroke-width="4"/>
    <line x1="360" y1="270" x2="360" y2="350" stroke="#fcd34d" stroke-width="2"/>
    
    <!-- Conch (lower left 2) -->
    <ellipse cx="45" cy="300" rx="18" ry="25" fill="#fef3c7" transform="rotate(-15, 45, 300)"/>
    <ellipse cx="45" cy="300" rx="10" ry="15" fill="#fde68a" transform="rotate(-15, 45, 300)"/>
  </g>
  
  <!-- Lion mount (vahana) below -->
  <g transform="translate(200, 470)">
    <ellipse cx="0" cy="0" rx="80" ry="35" fill="#f59e0b"/>
    <!-- Lion face -->
    <ellipse cx="0" cy="-15" rx="30" ry="25" fill="#fbbf24"/>
    <!-- Mane -->
    <ellipse cx="0" cy="-20" rx="45" ry="35" fill="#ea580c" opacity="0.7"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-20" r="4" fill="#1f2937"/>
    <circle cx="10" cy="-20" r="4" fill="#1f2937"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-10" rx="6" ry="4" fill="#92400e"/>
  </g>
  
  <!-- Aura rays -->
  <g filter="url(#glowEffect)" opacity="0.5">
    <line x1="200" y1="30" x2="200" y2="10" stroke="#fcd34d" stroke-width="2"/>
    <line x1="170" y1="35" x2="160" y2="15" stroke="#fcd34d" stroke-width="2"/>
    <line x1="230" y1="35" x2="240" y2="15" stroke="#fcd34d" stroke-width="2"/>
  </g>
</svg>
