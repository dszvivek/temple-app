<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="shivaGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="shivaSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="200" cy="280" rx="180" ry="220" fill="url(#shivaGlow)"/>
  
  <!-- Matted Hair (Jata) -->
  <ellipse cx="200" cy="120" rx="90" ry="60" fill="#4a5568"/>
  <path d="M120 110 Q100 150 110 200 Q130 220 140 180 Q150 140 120 110" fill="#374151"/>
  <path d="M280 110 Q300 150 290 200 Q270 220 260 180 Q250 140 280 110" fill="#374151"/>
  <path d="M130 130 Q90 180 100 250 Q120 270 130 220 Q140 170 130 130" fill="#4b5563"/>
  <path d="M270 130 Q310 180 300 250 Q280 270 270 220 Q260 170 270 130" fill="#4b5563"/>
  
  <!-- Crescent Moon on hair -->
  <g filter="url(#glowEffect)">
    <path d="M170 70 Q190 50 220 60 Q200 70 190 90 Q175 85 170 70" fill="url(#moonGlow)" stroke="#c7d2fe" stroke-width="1"/>
  </g>
  
  <!-- Third Eye -->
  <g filter="url(#glowEffect)">
    <ellipse cx="200" cy="145" rx="10" ry="5" fill="#ec4899"/>
    <ellipse cx="200" cy="145" rx="5" ry="3" fill="#f472b6"/>
  </g>
  
  <!-- Face -->
  <ellipse cx="200" cy="170" rx="55" ry="65" fill="url(#shivaSkin)"/>
  
  <!-- Eyes -->
  <ellipse cx="175" cy="165" rx="12" ry="8" fill="#1e293b"/>
  <ellipse cx="225" cy="165" rx="12" ry="8" fill="#1e293b"/>
  <circle cx="177" cy="165" r="4" fill="white"/>
  <circle cx="227" cy="165" r="4" fill="white"/>
  
  <!-- Serene smile -->
  <path d="M180 200 Q200 215 220 200" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Neck with rudraksha -->
  <rect x="175" y="230" width="50" height="30" fill="url(#shivaSkin)"/>
  <g>
    <circle cx="170" cy="260" r="6" fill="#92400e"/>
    <circle cx="185" cy="262" r="6" fill="#92400e"/>
    <circle cx="200" cy="263" r="6" fill="#92400e"/>
    <circle cx="215" cy="262" r="6" fill="#92400e"/>
    <circle cx="230" cy="260" r="6" fill="#92400e"/>
  </g>
  
  <!-- Torso -->
  <path d="M145 260 Q200 250 255 260 L260 350 Q200 360 140 350 Z" fill="url(#shivaSkin)"/>
  
  <!-- Tiger skin wrap -->
  <path d="M140 340 Q200 350 260 340 L265 420 Q200 430 135 420 Z" fill="#f59e0b"/>
  <ellipse cx="160" cy="380" rx="8" ry="12" fill="#1f2937"/>
  <ellipse cx="190" cy="385" rx="8" ry="12" fill="#1f2937"/>
  <ellipse cx="220" cy="385" rx="8" ry="12" fill="#1f2937"/>
  <ellipse cx="250" cy="380" rx="8" ry="12" fill="#1f2937"/>
  
  <!-- Trishul (Trident) -->
  <g filter="url(#glowEffect)">
    <rect x="295" y="80" width="6" height="350" fill="#9ca3af"/>
    <path d="M280 100 L298 80 L316 100 L308 100 L308 130 L288 130 L288 100 Z" fill="#d1d5db"/>
    <path d="M265 115 L280 85 L280 115 Z" fill="#d1d5db"/>
    <path d="M331 115 L316 85 L316 115 Z" fill="#d1d5db"/>
  </g>
  
  <!-- Damru (Drum) -->
  <g transform="translate(315, 250)">
    <ellipse cx="0" cy="-15" rx="15" ry="8" fill="#dc2626"/>
    <ellipse cx="0" cy="15" rx="15" ry="8" fill="#dc2626"/>
    <path d="M-15 -15 Q0 0 -15 15" fill="#b91c1c"/>
    <path d="M15 -15 Q0 0 15 15" fill="#b91c1c"/>
  </g>
  
  <!-- Snake around neck -->
  <path d="M130 270 Q110 285 115 300 Q140 320 170 310 Q200 300 230 310 Q260 320 285 300 Q290 285 270 270" 
        fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
  <circle cx="285" cy="275" r="5" fill="#16a34a"/>
  <ellipse cx="290" cy="270" rx="3" ry="2" fill="#1e293b"/>
  
  <!-- Lotus seat -->
  <g transform="translate(200, 450)">
    <ellipse cx="0" cy="0" rx="100" ry="30" fill="#ec4899" opacity="0.7"/>
    <path d="M-80 0 Q-60 -30 -40 0" fill="#f472b6"/>
    <path d="M-50 0 Q-30 -35 -10 0" fill="#f472b6"/>
    <path d="M-20 0 Q0 -40 20 0" fill="#f472b6"/>
    <path d="M10 0 Q30 -35 50 0" fill="#f472b6"/>
    <path d="M40 0 Q60 -30 80 0" fill="#f472b6"/>
  </g>
  
  <!-- Om symbol glow -->
  <g filter="url(#glowEffect)" transform="translate(200, 50)">
    <text x="0" y="0" text-anchor="middle" font-size="24" fill="#a78bfa" font-family="serif">ॐ</text>
  </g>
</svg>
