<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Incense sticks with animated smoke -->
  <defs>
    <linearGradient id="smoke" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#d1d5db;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="holderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a16207" />
      <stop offset="100%" style="stop-color:#78350f" />
    </linearGradient>
    <filter id="smokeBlur">
      <feGaussianBlur stdDeviation="2" />
    </filter>
    <style>
      @keyframes smokeRise1 {
        0% { transform: translateY(0) scaleX(1); opacity: 0; }
        10% { opacity: 0.6; }
        50% { transform: translateY(-40px) scaleX(1.2); opacity: 0.4; }
        100% { transform: translateY(-90px) scaleX(1.5); opacity: 0; }
      }
      @keyframes smokeRise2 {
        0% { transform: translateY(0) scaleX(1); opacity: 0; }
        10% { opacity: 0.5; }
        50% { transform: translateY(-50px) scaleX(1.3); opacity: 0.3; }
        100% { transform: translateY(-100px) scaleX(1.6); opacity: 0; }
      }
      @keyframes smokeRise3 {
        0% { transform: translateY(0) scaleX(1); opacity: 0; }
        10% { opacity: 0.4; }
        50% { transform: translateY(-45px) scaleX(1.1); opacity: 0.25; }
        100% { transform: translateY(-95px) scaleX(1.4); opacity: 0; }
      }
      @keyframes emberGlow {
        0%, 100% { opacity: 0.8; fill: #dc2626; }
        50% { opacity: 1; fill: #f97316; }
      }
      .smoke1 { animation: smokeRise1 4s ease-out infinite; transform-origin: center bottom; }
      .smoke2 { animation: smokeRise2 5s ease-out infinite 0.8s; transform-origin: center bottom; }
      .smoke3 { animation: smokeRise3 4.5s ease-out infinite 1.5s; transform-origin: center bottom; }
      .ember { animation: emberGlow 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="400" height="300" fill="#fff7ed"/>
  
  <!-- Incense holder -->
  <ellipse cx="200" cy="255" rx="65" ry="18" fill="#5c3411"/>
  <path d="M 135 250 Q 135 235, 150 230 L 250 230 Q 265 235, 265 250 L 265 250 Q 265 260, 250 265 L 150 265 Q 135 260, 135 250 Z" fill="url(#holderGrad)"/>
  <ellipse cx="200" cy="230" rx="50" ry="12" fill="#92400e"/>
  
  <!-- Ash in holder -->
  <ellipse cx="200" cy="232" rx="45" ry="8" fill="#9ca3af" opacity="0.5"/>
  
  <!-- Incense sticks -->
  <g>
    <!-- Stick 1 -->
    <rect x="178" y="100" width="3" height="130" fill="#92400e" rx="1.5"/>
    <rect x="178" y="100" width="3" height="90" fill="#7c3aed" opacity="0.6" rx="1.5"/>
    <circle class="ember" cx="179.5" cy="100" r="2.5" fill="#dc2626"/>
    
    <!-- Stick 2 -->
    <rect x="195" y="85" width="3" height="145" fill="#92400e" rx="1.5"/>
    <rect x="195" y="85" width="3" height="95" fill="#a855f7" opacity="0.6" rx="1.5"/>
    <circle class="ember" cx="196.5" cy="85" r="2.5" fill="#f97316" style="animation-delay: 0.3s"/>
    
    <!-- Stick 3 -->
    <rect x="212" y="92" width="3" height="138" fill="#92400e" rx="1.5"/>
    <rect x="212" y="92" width="3" height="92" fill="#7c3aed" opacity="0.6" rx="1.5"/>
    <circle class="ember" cx="213.5" cy="92" r="2.5" fill="#dc2626" style="animation-delay: 0.6s"/>
    
    <!-- Smoke trails with animation -->
    <g filter="url(#smokeBlur)">
      <path class="smoke1" d="M 179.5 100 Q 172 70, 178 45 Q 184 20, 172 -10" 
            fill="none" stroke="url(#smoke)" stroke-width="10"/>
      <path class="smoke2" d="M 196.5 85 Q 202 55, 195 28 Q 188 0, 198 -25" 
            fill="none" stroke="url(#smoke)" stroke-width="12"/>
      <path class="smoke3" d="M 213.5 92 Q 220 62, 214 35 Q 208 8, 218 -20" 
            fill="none" stroke="url(#smoke)" stroke-width="11"/>
    </g>
  </g>
  
  <!-- Decorative flowers -->
  <circle cx="145" cy="245" r="8" fill="#fbbf24" opacity="0.7"/>
  <circle cx="145" cy="245" r="4" fill="#f97316"/>
  <circle cx="255" cy="245" r="8" fill="#fb923c" opacity="0.7"/>
  <circle cx="255" cy="245" r="4" fill="#dc2626"/>
  
  <text x="200" y="290" font-size="14" text-anchor="middle" fill="#78350f" 
        font-family="serif" opacity="0.8">अगरबत्ती</text>
</svg>
