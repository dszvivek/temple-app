<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <defs>
    <radialGradient id="lampGlow">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:0.3" />
    </radialGradient>
    <radialGradient id="flameGlow">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
    <filter id="flame">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
    <linearGradient id="lampBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <style>
      @keyframes flicker {
        0%, 100% { transform: scaleY(1) scaleX(1); opacity: 0.9; }
        25% { transform: scaleY(1.05) scaleX(0.95); opacity: 1; }
        50% { transform: scaleY(0.95) scaleX(1.02); opacity: 0.85; }
        75% { transform: scaleY(1.02) scaleX(0.98); opacity: 0.95; }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.5; r: 80px; }
        50% { opacity: 0.7; r: 90px; }
      }
      @keyframes rayPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.5; }
      }
      .flame-group { animation: flicker 0.3s ease-in-out infinite; transform-origin: center bottom; }
      .glow { animation: glowPulse 2s ease-in-out infinite; }
      .rays { animation: rayPulse 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="400" height="400" fill="url(#lampGlow)"/>
  
  <!-- Flame glow effect -->
  <circle class="glow" cx="200" cy="130" r="80" fill="url(#flameGlow)"/>
  
  <!-- Traditional Diya (Oil Lamp) -->
  <g transform="translate(200, 200)">
    <!-- Lamp base with shadow -->
    <ellipse cx="0" cy="85" rx="85" ry="18" fill="#451a03" opacity="0.3"/>
    <ellipse cx="0" cy="80" rx="80" ry="20" fill="#78350f"/>
    <ellipse cx="0" cy="80" rx="70" ry="15" fill="#92400e"/>
    
    <!-- Lamp body with gradient -->
    <path d="M -70 80 Q -80 40, -60 10 L 60 10 Q 80 40, 70 80 Z" 
          fill="url(#lampBodyGrad)" stroke="#92400e" stroke-width="2"/>
    <path d="M -60 75 Q -70 45, -55 20 L 55 20 Q 70 45, 60 75 Z" 
          fill="#f59e0b"/>
    
    <!-- Oil surface with ripple effect -->
    <ellipse cx="0" cy="15" rx="50" ry="10" fill="#fbbf24" opacity="0.7"/>
    <ellipse cx="0" cy="15" rx="40" ry="8" fill="#fde047" opacity="0.4"/>
    
    <!-- Wick -->
    <rect x="-3" y="-30" width="6" height="50" fill="#78350f" rx="3"/>
    <rect x="-2" y="-28" width="4" height="48" fill="#451a03" rx="2"/>
    
    <!-- Flame with animation -->
    <g class="flame-group" filter="url(#flame)">
      <!-- Outer flame -->
      <path d="M 0 -30 Q -15 -50, -10 -80 Q -5 -95, 0 -100 Q 5 -95, 10 -80 Q 15 -50, 0 -30 Z" 
            fill="#f97316" opacity="0.8"/>
      <!-- Middle flame -->
      <path d="M 0 -35 Q -10 -50, -7 -75 Q -3 -88, 0 -92 Q 3 -88, 7 -75 Q 10 -50, 0 -35 Z" 
            fill="#fbbf24" opacity="0.9"/>
      <!-- Inner flame (blue core) -->
      <path d="M 0 -38 Q -4 -48, -3 -60 Q -1 -68, 0 -70 Q 1 -68, 3 -60 Q 4 -48, 0 -38 Z" 
            fill="#60a5fa" opacity="0.6"/>
      <!-- Bright core -->
      <path d="M 0 -40 Q -2 -50, -1 -58 Q 0 -62, 0 -63 Q 0 -62, 1 -58 Q 2 -50, 0 -40 Z" 
            fill="#fef3c7"/>
    </g>
    
    <!-- Decorative patterns on lamp -->
    <circle cx="-40" cy="50" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="40" cy="50" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="0" cy="65" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="-25" cy="60" r="4" fill="#fde047" opacity="0.6"/>
    <circle cx="25" cy="60" r="4" fill="#fde047" opacity="0.6"/>
    
    <!-- Light rays -->
    <g class="rays">
      <line x1="0" y1="-95" x2="0" y2="-130" stroke="#fbbf24" stroke-width="2"/>
      <line x1="0" y1="-95" x2="-25" y2="-125" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="0" y1="-95" x2="25" y2="-125" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="0" y1="-95" x2="-45" y2="-115" stroke="#fbbf24" stroke-width="1"/>
      <line x1="0" y1="-95" x2="45" y2="-115" stroke="#fbbf24" stroke-width="1"/>
      <line x1="0" y1="-95" x2="-55" y2="-100" stroke="#fbbf24" stroke-width="0.8"/>
      <line x1="0" y1="-95" x2="55" y2="-100" stroke="#fbbf24" stroke-width="0.8"/>
    </g>
  </g>
  
  <!-- Om symbol -->
  <text x="200" y="355" font-size="40" text-anchor="middle" fill="#92400e" 
        font-family="serif" font-weight="bold" opacity="0.5">ॐ</text>
</svg>
