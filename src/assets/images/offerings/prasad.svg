<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Plate of flowers and prasad -->
  <defs>
    <radialGradient id="plateShine">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcd34d;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="400" height="300" fill="#fffbeb"/>
  
  <!-- Golden plate/thali -->
  <ellipse cx="200" cy="200" rx="120" ry="30" fill="#b8860b" opacity="0.5"/>
  <ellipse cx="200" cy="195" rx="115" ry="25" fill="url(#plateShine)"/>
  <ellipse cx="200" cy="190" rx="110" ry="22" fill="#fbbf24"/>
  <circle cx="200" cy="190" r="100" fill="#fef3c7" opacity="0.3"/>
  
  <!-- Marigold flowers -->
  <g>
    <!-- Flower 1 -->
    <circle cx="160" cy="165" r="20" fill="#fb923c"/>
    <circle cx="155" cy="160" r="8" fill="#fdba74"/>
    <circle cx="165" cy="160" r="8" fill="#fdba74"/>
    <circle cx="155" cy="170" r="8" fill="#fdba74"/>
    <circle cx="165" cy="170" r="8" fill="#fdba74"/>
    <circle cx="160" cy="165" r="10" fill="#fbbf24"/>
    
    <!-- Flower 2 -->
    <circle cx="240" cy="170" r="20" fill="#f97316"/>
    <circle cx="235" cy="165" r="8" fill="#fb923c"/>
    <circle cx="245" cy="165" r="8" fill="#fb923c"/>
    <circle cx="235" cy="175" r="8" fill="#fb923c"/>
    <circle cx="245" cy="175" r="8" fill="#fb923c"/>
    <circle cx="240" cy="170" r="10" fill="#fbbf24"/>
    
    <!-- Flower 3 -->
    <circle cx="200" cy="155" r="22" fill="#dc2626"/>
    <circle cx="194" cy="150" r="9" fill="#f87171"/>
    <circle cx="206" cy="150" r="9" fill="#f87171"/>
    <circle cx="194" cy="160" r="9" fill="#f87171"/>
    <circle cx="206" cy="160" r="9" fill="#f87171"/>
    <circle cx="200" cy="155" r="11" fill="#fbbf24"/>
  </g>
  
  <!-- Tulsi leaves -->
  <g>
    <ellipse cx="180" cy="185" rx="6" ry="12" fill="#15803d" transform="rotate(20 180 185)"/>
    <ellipse cx="220" cy="188" rx="6" ry="12" fill="#15803d" transform="rotate(-20 220 188)"/>
    <ellipse cx="200" cy="195" rx="6" ry="12" fill="#16a34a" transform="rotate(0 200 195)"/>
  </g>
  
  <!-- Prasad (sweets) -->
  <g>
    <!-- Ladoo 1 -->
    <circle cx="170" cy="190" r="12" fill="#fbbf24"/>
    <circle cx="168" cy="188" r="3" fill="#fef3c7"/>
    
    <!-- Ladoo 2 -->
    <circle cx="230" cy="192" r="12" fill="#fb923c"/>
    <circle cx="228" cy="190" r="3" fill="#fef3c7"/>
  </g>
  
  <!-- Rice grains -->
  <g opacity="0.7">
    <ellipse cx="190" cy="185" rx="2" ry="3" fill="#fef3c7" transform="rotate(45 190 185)"/>
    <ellipse cx="210" cy="187" rx="2" ry="3" fill="#fef3c7" transform="rotate(-30 210 187)"/>
    <ellipse cx="195" cy="192" rx="2" ry="3" fill="#fef3c7" transform="rotate(60 195 192)"/>
  </g>
  
  <!-- Kumkum (vermillion) -->
  <circle cx="200" cy="180" r="8" fill="#dc2626" opacity="0.8"/>
  
  <text x="200" y="270" font-size="20" text-anchor="middle" fill="#92400e" 
        font-family="serif" font-weight="bold">प्रसाद</text>
  <text x="200" y="290" font-size="14" text-anchor="middle" fill="#78350f" 
        font-family="serif" opacity="0.7">Prasad</text>
</svg>
