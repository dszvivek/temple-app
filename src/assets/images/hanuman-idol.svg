<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Temple Building -->
  <g>
    <!-- Base -->
    <rect x="200" y="350" width="400" height="200" fill="#c2410c"/>
    <rect x="220" y="370" width="360" height="160" fill="#9a3412"/>
    
    <!-- Pillars -->
    <rect x="230" y="370" width="40" height="160" fill="#7c2d12"/>
    <rect x="365" y="370" width="40" height="160" fill="#7c2d12"/>
    <rect x="500" y="370" width="40" height="160" fill="#7c2d12"/>
    
    <!-- Roof -->
    <polygon points="400,150 150,350 650,350" fill="#ea580c"/>
    <polygon points="400,170 180,350 620,350" fill="#f97316"/>
    
    <!-- Top dome -->
    <ellipse cx="400" cy="150" rx="60" ry="40" fill="#d4af37"/>
    <circle cx="400" cy="120" r="15" fill="#fef3c7"/>
    
    <!-- Entrance -->
    <rect x="350" y="430" width="100" height="120" fill="#451a03"/>
    <ellipse cx="400" cy="430" rx="50" ry="20" fill="#78350f"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="20" fill="#fbbf24" opacity="0.3"/>
  <circle cx="700" cy="120" r="25" fill="#fbbf24" opacity="0.3"/>
  <circle cx="150" cy="500" r="15" fill="#fbbf24" opacity="0.3"/>
  <circle cx="650" cy="480" r="18" fill="#fbbf24" opacity="0.3"/>
  
  <!-- Om symbol above temple -->
  <text x="400" y="80" font-size="50" text-anchor="middle" fill="#dc2626" font-family="serif" font-weight="bold">ॐ</text>
  
  <!-- Temple name -->
    <!-- Temple name -->
  <text x="400" y="550" font-size="40" text-anchor="middle" fill="#7c2d12" font-family="serif" font-weight="bold">श्री हनुमान</text>
  <text x="400" y="580" font-size="32" text-anchor="middle" fill="#7c2d12" font-family="serif" font-weight="bold">Karunamayi Hanuman E-Mandir</text>
</svg>
</svg>
