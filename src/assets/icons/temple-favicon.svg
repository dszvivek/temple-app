<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="templeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Temple base with steps -->
  <rect x="6" y="52" width="52" height="10" rx="1" fill="url(#templeGrad)"/>
  <rect x="10" y="48" width="44" height="4" fill="#fb923c"/>
  
  <!-- Temple middle section -->
  <rect x="12" y="32" width="40" height="16" fill="url(#templeGrad)" stroke="#c2410c" stroke-width="0.5"/>
  
  <!-- Temple pillars with fluting effect -->
  <rect x="16" y="34" width="4" height="14" rx="0.5" fill="#c2410c"/>
  <rect x="17" y="34" width="2" height="14" fill="#ea580c"/>
  <rect x="30" y="34" width="4" height="14" rx="0.5" fill="#c2410c"/>
  <rect x="31" y="34" width="2" height="14" fill="#ea580c"/>
  <rect x="44" y="34" width="4" height="14" rx="0.5" fill="#c2410c"/>
  <rect x="45" y="34" width="2" height="14" fill="#ea580c"/>
  
  <!-- Temple roof (dome) with gradient -->
  <path d="M 8 32 L 32 14 L 56 32 Z" fill="url(#roofGrad)" stroke="#c2410c" stroke-width="0.5"/>
  
  <!-- Kalash (top ornament) with details -->
  <ellipse cx="32" cy="10" rx="3.5" ry="2.5" fill="url(#goldGrad)" filter="url(#glow)"/>
  <path d="M 29 10 Q 29 6 32 5 Q 35 6 35 10 Z" fill="url(#goldGrad)"/>
  <circle cx="32" cy="5" r="1.5" fill="#fde047" filter="url(#glow)"/>
  
  <!-- Temple entrance (darker arch) -->
  <path d="M 25 48 L 25 40 Q 25 36 32 36 Q 39 36 39 40 L 39 48 Z" fill="#7c2d12"/>
  <path d="M 27 48 L 27 41 Q 27 38 32 38 Q 37 38 37 41 L 37 48 Z" fill="#451a03"/>
  
  <!-- Om symbol glowing -->
  <text x="32" y="28" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">ॐ</text>
  
  <!-- Decorative corner elements -->
  <circle cx="16" cy="28" r="2" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="48" cy="28" r="2" fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- Hanging bells on sides -->
  <path d="M 20 20 Q 20 19 21 19 Q 22 19 22 20 L 22 22 Q 22 23 21 23.5 Q 20 23 20 22 Z" fill="url(#goldGrad)"/>
  <circle cx="21" cy="24" r="0.6" fill="#f59e0b"/>
  <path d="M 42 20 Q 42 19 43 19 Q 44 19 44 20 L 44 22 Q 44 23 43 23.5 Q 42 23 42 22 Z" fill="url(#goldGrad)"/>
  <circle cx="43" cy="24" r="0.6" fill="#f59e0b"/>
  
  <!-- Flame/diya at entrance -->
  <ellipse cx="32" cy="47" rx="2" ry="1" fill="#fbbf24" opacity="0.8"/>
  <path d="M 32 47 Q 30 44 32 41 Q 34 44 32 47 Z" fill="#f97316"/>
  <path d="M 32 46 Q 31 44 32 42 Q 33 44 32 46 Z" fill="#fef08a"/>
</svg>
