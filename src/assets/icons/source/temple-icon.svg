<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Temple base -->
  <rect x="8" y="48" width="48" height="12" fill="#f97316" stroke="#ea580c" stroke-width="1"/>
  
  <!-- Temple middle section -->
  <rect x="12" y="32" width="40" height="16" fill="#fb923c" stroke="#ea580c" stroke-width="1"/>
  
  <!-- Temple pillars -->
  <rect x="16" y="36" width="4" height="12" fill="#ea580c"/>
  <rect x="28" y="36" width="4" height="12" fill="#ea580c"/>
  <rect x="44" y="36" width="4" height="12" fill="#ea580c"/>
  
  <!-- Temple roof (dome) -->
  <path d="M 8 32 L 32 16 L 56 32 Z" fill="#f97316" stroke="#ea580c" stroke-width="1"/>
  
  <!-- Kalash (top ornament) -->
  <circle cx="32" cy="14" r="3" fill="#fbbf24"/>
  <rect x="31" y="14" width="2" height="4" fill="#fbbf24"/>
  <path d="M 29 18 L 32 12 L 35 18 Z" fill="#fbbf24"/>
  
  <!-- Temple entrance -->
  <rect x="26" y="40" width="12" height="8" fill="#7c2d12" stroke="#581c0c" stroke-width="0.5"/>
  
  <!-- Om symbol in the center -->
  <text x="32" y="28" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#fbbf24" text-anchor="middle">ॐ</text>
  
  <!-- Decorative elements -->
  <circle cx="18" cy="28" r="1.5" fill="#fbbf24"/>
  <circle cx="46" cy="28" r="1.5" fill="#fbbf24"/>
  
  <!-- Bell -->
  <path d="M 30 20 Q 30 18 32 18 Q 34 18 34 20 L 34 22 Q 34 24 32 25 Q 30 24 30 22 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5"/>
  <circle cx="32" cy="25.5" r="0.8" fill="#f59e0b"/>
</svg>
